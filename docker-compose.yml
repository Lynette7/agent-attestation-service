# ============================================================
# AAS docker-compose.yml
#
# Runs both services locally for end-to-end testing before
# pushing to Railway / any cloud host.
#
# Usage:
#   cp .env.example .env        # fill in your Sepolia keys
#   docker compose up --build   # first run (slow — builds nargo+bb)
#   docker compose up           # subsequent runs
#
# Services:
#   mock-api  → http://localhost:3002
#   api       → http://localhost:3001
# ============================================================

services:
  # ── Mock Agent Performance API ──────────────────────────────────
  mock-api:
    build:
      context: .
      dockerfile: Dockerfile.mock
    container_name: aas-mock-api
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      MOCK_API_PORT: "3002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── AAS API Server ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: aas-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      API_PORT: "3001"
      # Override the mock API URL to use the Docker service name
      AGENT_PERFORMANCE_API_URL: "http://mock-api:3002/api/performance"
    depends_on:
      mock-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
